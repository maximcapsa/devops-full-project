apiVersion: v2
name: ecommerce
description: Umbrella chart — full event-driven e-commerce platform in one install
type: application
version: 0.1.0
appVersion: "0.1.0"

# NOTE: service DNS names in subchart values assume the release is named
# "ecommerce" (helm upgrade --install ecommerce ...).
dependencies:
  - name: postgres
    version: 0.1.0
    repository: file://../postgres
  - name: redpanda
    version: 0.1.0
    repository: file://../redpanda
  - name: product
    version: 0.1.0
    repository: file://../product
  - name: order
    version: 0.1.0
    repository: file://../order
  - name: inventory
    version: 0.1.0
    repository: file://../inventory
  - name: payment
    version: 0.1.0
    repository: file://../payment
  - name: notification
    version: 0.1.0
    repository: file://../notification
  - name: bff
    version: 0.1.0
    repository: file://../bff
  - name: frontend
    version: 0.1.0
    repository: file://../frontend
