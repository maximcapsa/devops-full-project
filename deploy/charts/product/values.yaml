# product: catalog gRPC service, HA -> 2 replicas, spread, PDB.
replicas: 2
spread: true
pdb:
  enabled: true
  minAvailable: 1

image:
  repository: ecommerce/product
  tag: latest
  pullPolicy: IfNotPresent

ports:
  http: 8081
  grpc: 50051

env:
  PRODUCT_GRPC_PORT: "50051"
  PRODUCT_HTTP_PORT: "8081"
  LOG_LEVEL: "info"

secretEnv:
  - name: DATABASE_URL
    secretName: ecommerce-postgres
    secretKey: url

probes:
  livenessPath: /healthz
  readinessPath: /readyz

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
