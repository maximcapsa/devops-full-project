apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  username: {{ .Values.auth.username | quote }}
  password: {{ .Values.auth.password | quote }}
  # Full DSN consumed by every service (schema-per-service inside one DB).
  url: "postgres://{{ .Values.auth.username }}:{{ .Values.auth.password }}@{{ .Release.Name }}-postgres:5432/{{ .Values.auth.database }}?sslmode=disable"
