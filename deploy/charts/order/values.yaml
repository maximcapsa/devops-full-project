# order: order placement + saga status consumer, HA -> 2 replicas, spread, PDB.
replicas: 2
spread: true
pdb:
  enabled: true
  minAvailable: 1

image:
  repository: ecommerce/order
  tag: latest
  pullPolicy: IfNotPresent

ports:
  http: 8082
  grpc: 50052

env:
  ORDER_GRPC_PORT: "50052"
  ORDER_HTTP_PORT: "8082"
  KAFKA_BROKERS: "ecommerce-redpanda:9092"
  PRODUCT_GRPC_ADDR: "ecommerce-product:50051"
  LOG_LEVEL: "info"

secretEnv:
  - name: DATABASE_URL
    secretName: ecommerce-postgres
    secretKey: url

probes:
  livenessPath: /healthz
  readinessPath: /readyz

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
