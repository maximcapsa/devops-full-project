apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-redpanda
  labels:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ .Release.Name }}-redpanda
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redpanda
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redpanda
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args:
            - redpanda
            - start
            - --kafka-addr=internal://0.0.0.0:9092
            # Advertise the k8s service name — never localhost (clients resolve
            # this DNS name across the cluster).
            - --advertise-kafka-addr=internal://{{ .Release.Name }}-redpanda:9092
            - --mode=dev-container
            - --smp=1
            - --memory=768M
            - --default-log-level=info
          ports:
            - name: kafka
              containerPort: 9092
            - name: admin
              containerPort: 9644
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
          livenessProbe:
            httpGet:
              path: /v1/status/ready
              port: admin
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.storage.className }}
        storageClassName: {{ .Values.storage.className | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
