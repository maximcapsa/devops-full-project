# notification: saga event recorder + read API for the UI status view.
replicas: 1
spread: false
pdb:
  enabled: false
  minAvailable: 1

image:
  repository: ecommerce/notification
  tag: latest
  pullPolicy: IfNotPresent

ports:
  http: 8085
  grpc: 50055

env:
  NOTIFICATION_GRPC_PORT: "50055"
  NOTIFICATION_HTTP_PORT: "8085"
  KAFKA_BROKERS: "ecommerce-redpanda:9092"
  LOG_LEVEL: "info"

secretEnv:
  - name: DATABASE_URL
    secretName: ecommerce-postgres
    secretKey: url

probes:
  livenessPath: /healthz
  readinessPath: /readyz

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
