# Full local dev stack. Filled in phase by phase:
#   Phase 2 adds postgres + product. Phase 4 adds redpanda + order.
#   Phase 5 adds inventory/payment/notification. Phase 3/6 add bff + frontend.
#
# Usage: cp .env.example .env && make up
name: ecommerce

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 10

  product:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: product
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-ecommerce}?sslmode=disable
      PRODUCT_GRPC_PORT: "50051"
      PRODUCT_HTTP_PORT: "8081"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "50051:50051"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
