# Full local dev stack. Filled in phase by phase:
#   Phase 2 adds postgres + product. Phase 4 adds redpanda + order.
#   Phase 5 adds inventory/payment/notification. Phase 3/6 add bff + frontend.
#
# Usage: cp .env.example .env && make up
name: ecommerce

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      # internal listener for compose services; external for host tools (rpk/console consumer)
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --mode=dev-container
      - --smp=1
      - --default-log-level=info
    ports:
      - "19092:19092" # host access
      - "9644:9644"   # admin API
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 5s
      retries: 15

  product:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: product
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-ecommerce}?sslmode=disable
      PRODUCT_GRPC_PORT: "50051"
      PRODUCT_HTTP_PORT: "8081"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "50051:50051"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  order:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: order
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-ecommerce}?sslmode=disable
      KAFKA_BROKERS: redpanda:9092
      PRODUCT_GRPC_ADDR: product:50051
      ORDER_GRPC_PORT: "50052"
      ORDER_HTTP_PORT: "8082"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "50052:50052"
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      product:
        condition: service_started

  bff:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: bff
    environment:
      BFF_HTTP_PORT: "8080"
      PRODUCT_GRPC_ADDR: product:50051
      ORDER_GRPC_ADDR: order:50052
      CORS_ALLOW_ORIGIN: "*"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8080:8080"
    depends_on:
      - product
      - order

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      # server-side fetches use the compose network; browser uses localhost
      BFF_INTERNAL_URL: http://bff:8080
      NEXT_PUBLIC_BFF_URL: http://localhost:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - bff

volumes:
  pgdata:
  frontend_node_modules:
