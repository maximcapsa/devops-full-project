version: v2
managed:
  enabled: true
  # Don't rewrite go_package for the googleapis well-known types — they resolve
  # to the real google.golang.org/genproto module, not our local gen/.
  disable:
    - module: buf.build/googleapis/googleapis
  override:
    - file_option: go_package_prefix
      value: github.com/maximcapsa/devops-full-project/gen
plugins:
  - remote: buf.build/protocolbuffers/go:v1.34.2
    out: gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc-ecosystem/gateway:v2.21.0
    out: gen
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
