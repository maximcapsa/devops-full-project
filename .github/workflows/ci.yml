name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: buf lint
      # buf breaking is enabled once a baseline exists on main
      # - run: buf breaking --against 'https://github.com/${{ github.repository }}.git#branch=main'

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: go build ./...
      - run: go test ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: terraform fmt
        run: terraform fmt -check -recursive infra
        # validate runs in Phase 7 once modules exist
        continue-on-error: true

  # frontend job is added in Phase 3 once frontend/package.json exists
